<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMAR Page — Ingresar</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <span class="logo-robot">🤖</span>
        <div class="logo-titulo">IMAR PAGE</div>
        <div class="logo-sub">Plataforma de Robótica</div>
      </div>

      <!-- Formulario -->
      <form id="form-login" autocomplete="off">

        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Tu usuario..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Tu contraseña..."
              autocomplete="off"
            />
            <button type="button" class="toggle-pass" id="toggle-pass" title="Mostrar/ocultar">
              👁️
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          INGRESAR →
        </button>

        <div class="msg-error" id="msg-error">
          ❌ Usuario o contraseña incorrectos. Intentá de nuevo.
        </div>

      </form>

      <div class="login-footer">
        <span>IMAR Page</span> · Robótica Educativa 2026
      </div>

    </div>
  </div>

  <script src="./js/auth.js"></script>
  <script>
    // ---- Toggle mostrar/ocultar contraseña ----
    document.getElementById('toggle-pass').addEventListener('click', function () {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = '🙈';
      } else {
        input.type = 'password';
        this.textContent = '👁️';
      }
    });

    // ---- Submit del formulario ----
    document.getElementById('form-login').addEventListener('submit', async function (e) {
      e.preventDefault();

      const usuario  = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;
      const btnLogin = document.getElementById('btn-login');
      const msgError = document.getElementById('msg-error');

      // Validación mínima
      if (!usuario || !password) {
        msgError.textContent = '⚠️ Completá usuario y contraseña.';
        msgError.classList.add('visible');
        return;
      }

      // Estado de carga
      btnLogin.disabled = true;
      btnLogin.textContent = 'INGRESANDO...';
      msgError.classList.remove('visible');

      const resultado = await AUTH.login(usuario, password);

      if (resultado.ok) {
        btnLogin.textContent = '✅ BIENVENIDO/A';
        // Redirige según el usuario
        setTimeout(() => {
          window.location.href = resultado.usuario.redirige;
        }, 600);
      } else {
        btnLogin.disabled = false;
        btnLogin.textContent = 'INGRESAR →';
        msgError.textContent = resultado.error
          ? '⚠️ Error al cargar los usuarios. Avisale al profe.'
          : '❌ Usuario o contraseña incorrectos. Intentá de nuevo.';
        msgError.classList.add('visible');
        // Limpia contraseña
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    // ---- Enter en los campos ----
    ['usuario', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('form-login').requestSubmit();
      });
    });
  </script>

</body>
</html>
